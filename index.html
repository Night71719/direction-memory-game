<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>方向记忆联机小游戏</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="entryView" class="entry-view">
        <div class="brand-block">
          <p class="eyebrow">多人联机</p>
          <h1>方向记忆</h1>
          <p class="subtitle">看清本轮规则：按颜色，或按箭头。颜色和箭头会故意互相干扰。</p>
        </div>

        <form class="join-panel" id="entryForm">
          <label>
            <span>昵称</span>
            <input id="nameInput" maxlength="18" autocomplete="nickname" placeholder="输入你的昵称" required />
          </label>

          <div class="entry-actions">
            <button type="button" id="createRoomBtn" class="primary">创建房间</button>
          </div>

          <div class="join-row">
            <label>
              <span>房间号</span>
              <input id="roomCodeInput" maxlength="8" autocomplete="off" placeholder="例如 A7K9P" />
            </label>
            <button type="button" id="joinRoomBtn">加入</button>
          </div>
        </form>

        <p id="entryNotice" class="notice" aria-live="polite"></p>
      </section>

      <section id="roomView" class="room-view hidden">
        <header class="top-bar">
          <div>
            <p class="label">房间号</p>
            <div class="room-code-line">
              <strong id="roomCodeText">-----</strong>
              <button id="copyRoomBtn" class="small-btn" type="button">复制</button>
            </div>
          </div>
          <div>
            <p class="label">轮数</p>
            <strong id="roundText">第 0 / 10 轮</strong>
          </div>
          <div>
            <p class="label">你的分数</p>
            <strong id="myScoreText">0</strong>
          </div>
        </header>

        <section id="lobbyPanel" class="lobby-panel">
          <div class="host-tools">
            <div>
              <p class="label">总轮数</p>
              <div class="round-setting">
                <button id="roundMinusBtn" type="button" aria-label="减少总轮数">−</button>
                <input id="totalRoundsInput" type="number" min="1" max="30" value="10" />
                <button id="roundPlusBtn" type="button" aria-label="增加总轮数">+</button>
              </div>
            </div>
            <button id="startGameBtn" class="primary" type="button">开始游戏</button>
            <button id="restartGameBtn" class="primary hidden" type="button">再来一局</button>
          </div>
          <p id="hostHint" class="status-line">等待房主开始。</p>

          <div class="share-panel">
            <div class="qr-box">
              <img id="qrImage" alt="扫码加入房间" />
            </div>
            <div class="share-copy">
              <p class="label">微信扫码加入</p>
              <p id="shareUrlText" class="share-url"></p>
              <button id="copyLinkBtn" class="small-btn" type="button">复制链接</button>
            </div>
          </div>
        </section>

        <section class="score-board" aria-label="玩家分数列表">
          <div class="section-title">
            <span>玩家</span>
            <span id="playerCountText">0 人</span>
          </div>
          <div id="playerList" class="player-list"></div>
        </section>

        <section class="play-stage">
          <p id="difficultyText" class="difficulty">等待开始</p>
          <div id="ruleBanner" class="rule-banner">看清本轮规则</div>
          <div id="countdownText" class="countdown">--</div>
          <div id="stageMessage" class="stage-message">等待房主开始游戏</div>
          <div id="sequenceDisplay" class="sequence-display" aria-live="polite"></div>
          <div id="inputProgress" class="input-progress">已输入 0 / 0</div>
        </section>

        <section id="finalPanel" class="final-panel hidden">
          <h2>最终排行榜</h2>
          <div id="finalRankList" class="final-rank-list"></div>
        </section>

        <section id="pad" class="direction-pad" aria-label="方向按钮">
          <button class="dir-btn up color-red" type="button" data-dir="up" data-color="red" aria-label="上 红色">
            <span class="btn-arrow">↑</span>
            <span class="btn-color-name">红</span>
          </button>
          <button class="dir-btn left color-blue" type="button" data-dir="left" data-color="blue" aria-label="左 蓝色">
            <span class="btn-arrow">←</span>
            <span class="btn-color-name">蓝</span>
          </button>
          <button class="dir-btn down color-yellow" type="button" data-dir="down" data-color="yellow" aria-label="下 黄色">
            <span class="btn-arrow">↓</span>
            <span class="btn-color-name">黄</span>
          </button>
          <button class="dir-btn right color-green" type="button" data-dir="right" data-color="green" aria-label="右 绿色">
            <span class="btn-arrow">→</span>
            <span class="btn-color-name">绿</span>
          </button>
        </section>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
